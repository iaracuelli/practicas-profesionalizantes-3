<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>V5</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="./assets/icons/font-awesome-4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="./assets/css/w3pro-4.13.css">
    <link rel="stylesheet" href="./assets/css/w3-theme.css">
    <link rel="stylesheet" href="./assets/css/admin-styles.css">
</head>
<body class="w3-light-grey">

    <div class="w3-padding-32">
        <div class="w3-auto" style="width:380px">
            <wc-register-form-view></wc-register-form-view>
        </div>
    </div>

    <script>
class WCRegisterFormView extends HTMLElement
{
    constructor()
    {
        super();

        // elementos
        this.container = document.createElement('div');
        this.innerContainer = document.createElement('div');

        this.headerDiv = document.createElement('div');
        this.logo = document.createElement('img');
        this.signUpText = document.createElement('p');

        this.usernameDiv = document.createElement('div');
        this.inputUsername = document.createElement('input');

        this.emailDiv = document.createElement('div');
        this.inputEmail = document.createElement('input');

        this.passwordDiv = document.createElement('div');
        this.inputPassword = document.createElement('input');

        this.btnSignUp = document.createElement('button');

        this.footerDiv = document.createElement('div');
        this.footerText = document.createElement('p');
        this.footerSpan = document.createElement('span');
        this.footerLink = document.createElement('a');

        // clases atributos estilos
        this.container.classList.add('w3-white', 'w3-round', 'w3-margin-bottom', 'w3-border');
        this.innerContainer.classList.add('w3-padding-large');

        this.headerDiv.classList.add('w3-center', 'w3-padding-16');
        this.logo.src = './assets/admin-logo.png';
        this.logo.alt = 'w3mix';
        this.logo.classList.add('w3-image');
        this.signUpText.innerText = 'SIGN UP';

        this.usernameDiv.classList.add('w3-margin-bottom');
        this.inputUsername.type = 'text';
        this.inputUsername.classList.add('w3-input', 'w3-round', 'w3-border');
        this.inputUsername.placeholder = 'Enter Your Username';

        this.emailDiv.classList.add('w3-margin-bottom');
        this.inputEmail.type = 'text';
        this.inputEmail.classList.add('w3-input', 'w3-round', 'w3-border');
        this.inputEmail.placeholder = 'Enter Your Email';

        this.passwordDiv.classList.add('w3-margin-bottom');
        this.inputPassword.type = 'password';
        this.inputPassword.classList.add('w3-input', 'w3-round', 'w3-border');
        this.inputPassword.placeholder = 'Choose Password';

        this.btnSignUp.type = 'button';
        this.btnSignUp.classList.add('w3-button', 'w3-round', 'w3-margin-bottom', 'w3-primary', 'w3-block');
        this.btnSignUp.innerText = 'Sign Up';

        this.footerDiv.classList.add('w3-center', 'w3-border-top');
        this.footerText.classList.add('w3-margin');
        this.footerSpan.classList.add('w3-text-warning');
        this.footerSpan.innerText = 'Already have an account? ';
        this.footerLink.href = 'login.html';
        this.footerLink.innerText = 'Sign In here';

        // estructura
        this.headerDiv.appendChild(this.logo);
        this.headerDiv.appendChild(this.signUpText);

        this.usernameDiv.appendChild(this.inputUsername);
        this.emailDiv.appendChild(this.inputEmail);
        this.passwordDiv.appendChild(this.inputPassword);

        this.innerContainer.appendChild(this.headerDiv);
        this.innerContainer.appendChild(this.usernameDiv);
        this.innerContainer.appendChild(this.emailDiv);
        this.innerContainer.appendChild(this.passwordDiv);
        this.innerContainer.appendChild(this.btnSignUp);

        this.footerText.appendChild(this.footerSpan);
        this.footerText.appendChild(this.footerLink);
        this.footerDiv.appendChild(this.footerText);

        this.container.appendChild(this.innerContainer);
        this.container.appendChild(this.footerDiv);

        this.appendChild(this.container);
    }

    connectedCallback()
    {
       
    }

    disconnectedCallback()
    {
        
    }
}

customElements.define('wc-register-form-view', WCRegisterFormView);

</script>

</body>
</html>
